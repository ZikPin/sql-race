<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SQL Race – Admin</title>
</head>
<body>
    <h1>Admin Login</h1>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/admin/login">
        <input
            type="password"
            name="password"
            placeholder="Password"
            required
            autofocus
        />
        <button type="submit">Login</button>
    </form>
</body>
</html>
