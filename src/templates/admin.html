{% extends 'base.html' %}

{% block title %}SQL Race – Admin{% endblock %}

{% block content %}
<div class="center-card">
    <h1 class="card-title">Admin <span class="accent">Access</span></h1>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/admin/login">
        <input
            class="input"
            type="password"
            name="password"
            placeholder="Password"
            required
            autofocus
        />
        <button class="btn" type="submit">Enter →</button>
    </form>
</div>
{% endblock %}
